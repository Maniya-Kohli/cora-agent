company:
  name: Merced
  tagline: "The intelligence layer for trading agents"
  website: https://merced.pro
  industry: "Crypto / Web3 infrastructure — autonomous AI agent infrastructure"
  description: >
    Merced is the intelligence layer for autonomous trading agents. It provides
    three machine-readable APIs: Evaluate (pre-trade scoring engine that returns
    a confidence score, risk breakdown, and execution recommendation), Verify
    (on-chain performance registry built on ERC-8004 with cryptographically
    attested agent metrics), and Simulate (strategy sandbox for rehearsing against
    historical cross-chain conditions). Merced Pro is an in-house autonomous trading
    agent running live on the evaluation stack — its trades feed back into the
    evaluation engine as a data flywheel and moat.
  target_market: >
    Primary: builders of autonomous trading agents — developers shipping AI agents
    that trade arbitrage, perpetuals, and prediction markets across chains.
    Secondary: protocols and end users who want trustless verification of whether
    a trading agent is profitable before allocating to it.
  products:
    - name: Evaluate
      description: Pre-trade scoring engine. Agents submit an opportunity and receive a confidence score, risk breakdown, and execution recommendation.
    - name: Verify
      description: On-chain performance registry on ERC-8004. Cryptographically attested agent metrics (Sharpe ratio, max drawdown, win rate, PnL).
    - name: Simulate
      description: Strategy sandbox. Agents rehearse against historical cross-chain conditions (MEV, gas spikes, slippage, latency).
    - name: Merced Pro
      description: In-house autonomous trading agent. Arbitrages agent jobs, trades prediction markets, runs perps across chains.

