brand:
  logo:
    description: "Red circle (left) overlapping a dark maroon square (right) — the Merced icon. Wordmark is 'merced.' in bold white lowercase with trailing period."
    primary_icon_color: "#ff4d4d"
    square_color: "#7a1515"
    icon_background: "#0a0a0a"
    svg_path: ".tmp/merced_logo.svg"
    png_path: ".tmp/merced_logo.png"
    note: "Save the actual logo PNG to .tmp/merced_logo.png for highest fidelity in the PDF. SVG fallback is used otherwise."
  colors:
    primary_accent: "#ff4d4d"       # Merced red — CTAs, logo, key highlights
    background: "#0a0a0a"           # Near-black page background
    surface: "#0d0d0d"              # Card/panel background
    border: "#2a2a2a"               # Subtle borders
    foreground: "#ffffff"           # Primary text
    muted: "#9ca3af"                # Secondary/subdued text
    emerald: "#00d294"              # Positive / profit indicators
    amber: "#f99c00"                # Warning / caution indicators
    blue: "#54a2ff"                 # Info / link color
  typography:
    primary_font: "PP Neue Montreal"
    weights:
      - Bold
      - Medium
      - Book
    fallback: "Inter, system-ui, sans-serif"
    style_notes: >
      Dark theme. Heavy use of near-black backgrounds with white text.
      Red accent (#ff4d4d) used sparingly for CTAs and key callouts.
      Clean, technical, minimal — crypto-native aesthetic.

google_drive:
